<div class="flashita">

<script>

<script>

    "🎉 <strong>¡Bienvenido!</strong><br>🛍️ ¡Descubre las mejores ofertas!"
];

const numero = Math.floor(Math.random() * mensajes.length);

document.getElementById("flashitaMensaje").innerHTML = mensajes[numero];

setTimeout(function(){

    document.querySelector(".flashita").style.opacity="0";

    setTimeout(function(){

        document.querySelector(".flashita").style.display="none";

    },500);

},7000);

</script>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Flash</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="panel">

<h1>⚡ Panel Flash</h1>

<p>Publica nuevas ofertas en segundos.</p>

<form id="formOferta">

<label>🔗 Enlace de Afiliado</label>
<input type="text" id="enlace" placeholder="Pega aquí tu enlace de afiliado">

<label>📝 Nombre del producto</label>
<input type="text" id="nombre">

<label>💲 Precio</label>
<input type="text" id="precio">

<label>💸 Precio anterior</label>
<input type="text" id="antes">

<label>🏷️ Descuento</label>
<input type="text" id="descuento">

<label>💰 Ahorro</label>
<input type="text" id="ahorro">

<label>📂 Categoría</label>

<select id="categoria">

<option>Hogar</option>

<option>Electrónica</option>

<option>Cocina</option>

<option>Juguetes</option>

<option>Moda</option>

<option>Herramientas</option>

</select>

<label>🖼 Imagen</label>

<input type="file" id="imagen">

<button type="submit">

🚀 PUBLICAR OFERTA

</button>

</form>

</div>

<script type="module" src="admin.js"></script>

</body>

</html>

<h2>📦 Ofertas Publicadas</h2>

<table id="tablaOfertas">

    <thead>

        <tr>

            <th>Producto</th>

            <th>Precio</th>

            <th>Categoría</th>

            <th>Acciones</th>

        </tr>

    </thead>

    <tbody>

    </tbody>

</table>

<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Flash</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="panel">

    <!-- IZQUIERDA -->
    <div>

        <h1>⚡ Panel Flash</h1>

        <p>Publica nuevas ofertas en segundos.</p>

        <form id="formOferta">

            <label>🔗 Enlace de Afiliado</label>
            <input type="text" id="enlace" placeholder="Pega aquí tu enlace de afiliado">

            <label>📝 Nombre del producto</label>
            <input type="text" id="nombre">

<label>📂 Categoría</label>
            
<div class="selectorCategoria">

    <button type="button" id="btnCategoria">
        🤖 Automática
        <span>▼</span>
    </button>

    <div id="menuCategorias" class="menuCategorias">

        <div onclick="seleccionarCategoria('Tecnología','💻 Tecnología')">💻 Tecnología</div>
        <div onclick="seleccionarCategoria('Hogar','🏠 Hogar')">🏠 Hogar</div>
        <div onclick="seleccionarCategoria('Cocina','🍳 Cocina')">🍳 Cocina</div>
        <div onclick="seleccionarCategoria('Belleza','💄 Belleza')">💄 Belleza</div>
        <div onclick="seleccionarCategoria('Moda','👗 Moda')">👗 Moda</div>
        <div onclick="seleccionarCategoria('Mascotas','🐶 Mascotas')">🐶 Mascotas</div>
        <div onclick="seleccionarCategoria('Bebés','👶 Bebés')">👶 Bebés</div>
        <div onclick="seleccionarCategoria('Juguetes','🧸 Juguetes')">🧸 Juguetes</div>
        <div onclick="seleccionarCategoria('Viajes','✈️ Viajes')">✈️ Viajes</div>
        <div onclick="seleccionarCategoria('Oficina','💼 Oficina')">💼 Oficina</div>
        <div onclick="seleccionarCategoria('Otros','📦 Otros')">📦 Otros</div>

    </div>

    <input type="hidden" id="categoria" value="Automática">

</div>

            <label>💲 Precio</label>
            <input type="text" id="precio">

            <label>💸 Precio anterior</label>
            <input type="text" id="antes">

            <label>🖼 Nombre de la imagen</label>
            <input
                type="text"
                id="imagen"
                placeholder="Ejemplo: Aspiradora.jpg">

            <label>🏷 Código de descuento (opcional)</label>
<input
    type="text"
    id="codigo"
    placeholder="Ejemplo: SAVE20">

<label>🏷 Tipo de descuento</label>
<select id="tipoDescuento">
    <option value="precio">💲 Solo precio rebajado</option>
    <option value="cupon">🎟 Cupón de Amazon</option>
    <option value="codigo">📋 Código promocional</option>
</select>

<label>Estado</label>

<select id="estado">
    <option value="activa">🟢 Activa</option>
    <option value="oculta">🔴 Oculta</option>
</select>

<label>📅 Fecha de expiración</label>
<input type="date" id="fechaExpiracion">
<div class="botones-expiracion">

    <button type="button" id="btnManana" onclick="venceManana()">
        ⚡ Mañana
    </button>

    <button type="button" id="btn7Dias" onclick="vence7Dias()">
        📅 7 días
    </button>

</div>
            
            <button type="submit">
                🚀 PUBLICAR OFERTA
            </button>

        </form>

        <p id="totalOfertas" class="total-ofertas"></p>

        <h2 style="margin-top:40px;">📦 Ofertas Publicadas</h2>

        <table id="tablaOfertas">

<thead>
    <tr>
        <th>Imagen</th>
        <th>Producto</th>
        <th>Precio</th>
        <th>👆 Clics</th>
        <th>Acciones</th>
    </tr>
</thead>

            <tbody>

            </tbody>

        </table>

    </div>

    <!-- DERECHA -->

</div>

<script type="module" src="admin.js"></script>

</body>

</html>

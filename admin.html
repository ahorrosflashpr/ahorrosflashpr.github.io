<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Flash</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="panel">

    <!-- IZQUIERDA -->
    <div>

        <h1>⚡ Panel Flash</h1>

        <p>Publica nuevas ofertas en segundos.</p>

        <form id="formOferta">

            <label>🔗 Enlace de Afiliado</label>
            <input type="text" id="enlace" placeholder="Pega aquí tu enlace de afiliado">

            <label>📝 Nombre del producto</label>
            <input type="text" id="nombre">

            <label>💲 Precio</label>
            <input type="text" id="precio">

            <label>💸 Precio anterior</label>
            <input type="text" id="antes">

            <label>🖼 Nombre de la imagen</label>
            <input
                type="text"
                id="imagen"
                placeholder="Ejemplo: Aspiradora.jpg">

            <label>🏷 Código de descuento (opcional)</label>
            <input
                type="text"
                id="codigo"
                placeholder="Ejemplo: SAVE20">

            <button type="submit">
                🚀 PUBLICAR OFERTA
            </button>

        </form>

        <p id="totalOfertas" class="total-ofertas"></p>

        <h2 style="margin-top:40px;">📦 Ofertas Publicadas</h2>

        <table id="tablaOfertas">

            <thead>

                <tr>

                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody>

            </tbody>

        </table>

    </div>

    <!-- DERECHA -->
    <div class="preview">

        <h2>👀 Vista previa</h2>

        <div class="card preview-card">

            <div class="descuento" id="pDescuento">-0%</div>

            <img id="pImagen" src="images/logo.png" alt="Vista previa">

            <h2 id="pNombre">Nombre del producto</h2>

            <p class="old" id="pAntes">$0.00</p>

            <p class="price" id="pPrecio">$0.00</p>

            <button
                class="btn-codigo"
                id="pCodigo"
                style="display:none;">

                📋 COPIAR CÓDIGO

            </button>

            <a class="btn-oferta">
                🔥 VER OFERTA AHORA
            </a>

        </div>

    </div>

</div>

<script type="module" src="admin.js"></script>

</body>

</html>

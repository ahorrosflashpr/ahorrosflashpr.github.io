<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Flash</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="panel">

    <!-- IZQUIERDA -->
    <div>

        <h1>⚡ Panel Flash</h1>

        <p>Publica nuevas ofertas en segundos.</p>

        <form id="formOferta">

            <label>🔗 Enlace de Afiliado</label>
            <input type="text" id="enlace" placeholder="Pega aquí tu enlace de afiliado">

            <label>📝 Nombre del producto</label>
            <input type="text" id="nombre">

<label>📂 Categoría</label>
            
<div class="selectorCategoria">

    <button type="button" id="btnCategoria">
        📂 Seleccionar categoría
        <span>▼</span>
    </button>

    <div id="menuCategorias" class="menuCategorias">

        <div onclick="seleccionarCategoria('Hogar','🏠 Hogar')">🏠 Hogar</div>
        <div onclick="seleccionarCategoria('Tecnología','💻 Tecnología')">💻 Tecnología</div>
        <div onclick="seleccionarCategoria('Cocina','🍳 Cocina')">🍳 Cocina</div>
        <div onclick="seleccionarCategoria('Belleza','💄 Belleza')">💄 Belleza</div>
        <div onclick="seleccionarCategoria('Oficina','💼 Oficina')">💼 Oficina</div>
        <div onclick="seleccionarCategoria('Moda','👗 Moda')">👗 Moda</div>
        <div onclick="seleccionarCategoria('Mascotas','🐶 Mascotas')">🐶 Mascotas</div>
        <div onclick="seleccionarCategoria('Bebés','👶 Bebés')">👶 Bebés</div>
        <div onclick="seleccionarCategoria('Juguetes','🧸 Juguetes')">🧸 Juguetes</div>
        <div onclick="seleccionarCategoria('Otros','📦 Otros')">📦 Otros</div>

    </div>

    <input type="hidden" id="categoria" value="Hogar">

</div>

            <div class="fila">

    <div class="campo">

        <label>💲 Precio</label>
        <input type="text" id="precio">

    </div>

    <div class="campo">

        <label>💸 Precio anterior</label>
        <input type="text" id="antes">

    </div>

</div>

            <div class="fila">

    <div class="campo">

        <label>🖼 Nombre de la imagen</label>

<div id="zonaImagen" class="zonaImagen">

    <input
        id="imagen"
        type="text"
        placeholder="producto.jpg">

    <input
        type="file"
        id="selectorImagen"
        accept="image/*"
        hidden>

    <small>📂 Haz clic o arrastra una imagen aquí</small>

</div>

    </div>

    <div class="campo">

        <label>🏷 Tipo de descuento</label>

        <select id="tipoDescuento">
            <option value="precio">💰 BAJO PRECIO</option>
            <option value="cupon">🎟 Cupón de Amazon</option>
            <option value="codigo">📋 Código promocional</option>
        </select>

    </div>

</div>

<button type="submit">
    🚀 PUBLICAR OFERTA
</button>

<div class="fila">

    <div class="campo">

        <label>🏷 Código de descuento (opcional)</label>

        <input
            type="text"
            id="codigo"
            placeholder="Ejemplo: SAVE20">

    </div>

    <div class="campo">

        <label>🟢 Estado</label>

        <select id="estado">
            <option value="activa">🟢 Activa</option>
            <option value="oculta">🔴 Oculta</option>
        </select>

    </div>

</div>

<label>📅 Fecha de expiración</label>
<input type="date" id="fechaExpiracion">

<div class="botones-expiracion">

    <button type="button" id="btnManana" onclick="venceManana()">
        ⚡ Mañana
    </button>

    <button type="button" id="btn7Dias" onclick="vence7Dias()">
        📅 7 días
    </button>

</div>

        </form>

        <div class="herramientas">

    <h2>📦 Ofertas Publicadas</h2>

    <input
        type="text"
        id="buscarOferta"
        placeholder="🔍 Buscar producto...">

    <div class="acciones">

        <button id="btnCategorias" class="btnCategorias">
            🗂 Categorías
        </button>

        <button id="btnMoverSeleccionadas">
            📅 Mover a AYER
        </button>

    </div>

</div>

<div class="tablaResponsive">

<table id="tablaOfertas">

    <thead>

        <tr>

            <th width="40">
                <input type="checkbox" id="seleccionarTodo">
            </th>

            <th width="80">🖼</th>

            <th>Producto</th>

            <th width="90">💲</th>

            <th width="80">👆</th>

            <th width="160">Acciones</th>

        </tr>

    </thead>

    <tbody>

    </tbody>

</table>

    <div class="paginacion">

    <button id="btnAnterior" disabled>
        ◀ Anterior
    </button>

    <span id="infoPagina">
        Página 1
    </span>

    <button id="btnSiguiente">
        Siguiente ▶
    </button>

</div>

</div>

    </div>

    <!-- DERECHA -->

</div>

    <div id="modalCategorias" class="modal" style="display:none;">

    <div class="modal-contenido">

        <h2>🗂 Administrar categorías</h2>

        <div id="listaCategorias"></div>

        <br>

        <button id="guardarCategorias">
        💾 Guardar categorías
        </button>

        <br>

        <button id="cerrarCategorias">
            ❌ Cerrar
        </button>

    </div>

    </div>
    

<script type="module" src="admin.js"></script>

</body>

</html>

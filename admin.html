<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Flash</title>

<link rel="stylesheet" href="admin.css">

</head>

<body>

<div class="panel">

    <!-- IZQUIERDA -->
    <div>

        <h1>⚡ Panel Flash</h1>

        <p>Publica nuevas ofertas en segundos.</p>

        <form id="formOferta">

            <label>🔗 Enlace de Afiliado</label>
            <input type="text" id="enlace" placeholder="Pega aquí tu enlace de afiliado">

            <label>📝 Nombre del producto</label>
            <input type="text" id="nombre">

<label>📂 Categoría</label>

<select id="categoria">

    <option value="Automática">🤖 Automática</option>

    <option value="Tecnología">💻 Tecnología</option>

    <option value="Hogar">🏠 Hogar</option>

    <option value="Cocina">🍳 Cocina</option>

    <option value="Belleza">💄 Belleza</option>

    <option value="Moda">👗 Moda</option>

    <option value="Mascotas">🐶 Mascotas</option>

    <option value="Bebés">👶 Bebés</option>

    <option value="Juguetes">🧸 Juguetes</option>

    <option value="Viajes">✈️ Viajes</option>

    <option value="Oficina">💼 Oficina</option>

    <option value="Otros">📦 Otros</option>

</select>

            <label>💲 Precio</label>
            <input type="text" id="precio">

            <label>💸 Precio anterior</label>
            <input type="text" id="antes">

            <label>🖼 Nombre de la imagen</label>
            <input
                type="text"
                id="imagen"
                placeholder="Ejemplo: Aspiradora.jpg">

            <label>🏷 Código de descuento (opcional)</label>
            <input
                type="text"
                id="codigo"
                placeholder="Ejemplo: SAVE20">
            <label>Estado</label>

<select id="estado">
    <option value="activa">🟢 Activa</option>
    <option value="oculta">🔴 Oculta</option>
</select>

            <button type="submit">
                🚀 PUBLICAR OFERTA
            </button>

        </form>

        <p id="totalOfertas" class="total-ofertas"></p>

        <h2 style="margin-top:40px;">📦 Ofertas Publicadas</h2>

        <table id="tablaOfertas">

<thead>
    <tr>
        <th>Imagen</th>
        <th>Producto</th>
        <th>Precio</th>
        <th>👆 Clics</th>
        <th>Acciones</th>
    </tr>
</thead>

            <tbody>

            </tbody>

        </table>

    </div>

    <!-- DERECHA -->

</div>

<script type="module" src="admin.js"></script>

</body>

</html>
